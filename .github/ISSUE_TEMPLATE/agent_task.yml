name: Agent task (autonomy-ready)
description: Scope a bounded task an AI agent can execute and open a PR for, with the guardrails the risk-lane classifier expects
labels: [agent-task]
body:
  - type: markdown
    attributes:
      value: |
        Use this template to hand a **bounded** task to an AI agent. The fields below map directly to the
        deterministic PR risk-lane classifier (`.github/scripts/classify-pr-risk-lane.mjs`) and the runbook at
        [`doc/PR-RISK-LANES.md`](https://github.com/haykel1977/paperclip/blob/main/doc/PR-RISK-LANES.md).

        The classifier is **fail-closed**: touching `.github/**`, CODEOWNERS, governance/checker code, auth/authz,
        secrets, migrations/schema, infrastructure/release/production, or dependency manifests/lockfiles — or an
        oversized diff — lands the PR in **RED** (human required). Keep the scope inside the allowed paths below to
        stay in GREEN/ORANGE.
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: One or two sentences on exactly what the agent should change and why. Keep it narrow.
    validations:
      required: true
  - type: textarea
    id: allowed_paths
    attributes:
      label: Allowed paths
      description: Globs the agent MAY edit. Prefer bounded low-risk areas so the PR can reach GREEN/ORANGE.
      placeholder: |
        server/src/services/**
        ui/src/components/**
    validations:
      required: true
  - type: textarea
    id: forbidden_paths
    attributes:
      label: Forbidden paths
      description: Paths the agent MUST NOT touch. Anything here (and every sacred RED surface) is off-limits.
      value: |
        .github/**
        **/CODEOWNERS
        scripts/check-*.mjs
        **/auth*, **/authz*
        **/*.env*, .gitleaks.toml
        **/migrations/**, **/schema/**, **/*.sql
        Dockerfile*, docker/**, releases/**, scripts/release*
        **/package.json, pnpm-lock.yaml, pnpm-workspace.yaml, .npmrc
    validations:
      required: true
  - type: textarea
    id: definition_of_done
    attributes:
      label: Definition of Done
      description: Concrete, checkable acceptance criteria. What must be true for this to be complete?
    validations:
      required: true
  - type: textarea
    id: tests
    attributes:
      label: Tests
      description: Which tests must be added/updated and which command proves them (e.g. `pnpm test:run`, targeted `node --test`).
    validations:
      required: true
  - type: textarea
    id: rollback
    attributes:
      label: Rollback plan
      description: How to safely revert this change if it misbehaves after merge.
    validations:
      required: true
  - type: input
    id: agent_identity
    attributes:
      label: Agent / model / runtime / attempt
      description: Which agent identity, model ID, runtime, and attempt number will produce this PR.
      placeholder: "paperclipai[bot] · claude-opus-4-7 · node 24 · attempt 1"
    validations:
      required: true
  - type: dropdown
    id: expected_lane
    attributes:
      label: Expected risk lane
      description: The lane you expect the resulting PR to land in. RED means a human must review and merge.
      options:
        - GREEN — bounded low-risk diff, auto-merge eligible
        - ORANGE — needs extra human evidence, no auto-merge
        - RED — sacred surface or fail-closed, human required
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Required evidence
      description: The checks/evidence that must be green for autonomy (e.g. `verify`, `gitleaks`). Neutral/skipped/missing fails closed.
      value: |
        - verify
        - gitleaks
    validations:
      required: true
