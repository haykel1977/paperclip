name: Autonomy Witness

# Permanent, tightly-bounded operational witness infrastructure.
#
# Purpose: prove that the allowlisted autonomous identity `github-actions[bot]`
# can open a green, docs-only pull request through branch-protected checks —
# without any human or non-allowlisted identity in the loop. This is the genuine
# counterpart to a human-authored witness (which correctly fails the autonomy
# allowlist).
#
# Hard bounds (enforced by policy tests in
# .github/scripts/tests/autonomy-witness-workflow.test.mjs):
#   - Manual dispatch only, and NO inputs (no arbitrary path/content/shell).
#   - Writes exactly one generated docs file under doc/autonomy-witness/<run_id>.md.
#   - Fixed branch prefix `autonomy-witness/`.
#   - Minimal permissions: contents:write + pull-requests:write only.
#   - Uses only the built-in GITHUB_TOKEN — no secrets, PAT, or App key.
#   - Only first-party actions, pinned by commit SHA — no third-party/mutable actions.
#   - Never merges, never approves, never changes settings.
#   - Idempotent / re-run safe: one PR per run id.
#
# Cleanup: each witness PR is disposable. After witnessing green checks, close the
# PR and delete its `autonomy-witness/<run_id>` branch; the run-id docs file may be
# removed at any time. Nothing here is load-bearing beyond the witness itself.

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: autonomy-witness-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  witness:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout default branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Open docs-only witness PR as github-actions[bot]
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.run_id }}
          HEAD_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          BRANCH="autonomy-witness/${RUN_ID}"
          DOC_DIR="doc/autonomy-witness"
          DOC_PATH="${DOC_DIR}/${RUN_ID}.md"
          OWNER="${REPO%%/*}"

          # Allowlisted autonomous identity. Only GITHUB_TOKEN is used; the PR is
          # therefore authored by github-actions[bot].
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "$BRANCH"
          mkdir -p "$DOC_DIR"

          # Fully generated content from trusted run metadata only. No workflow
          # inputs exist, so nothing user-supplied can reach the path or the body.
          {
            printf '# Autonomy witness — run %s\n\n' "$RUN_ID"
            printf 'Generated by the Autonomy Witness workflow to prove that the\n'
            printf 'allowlisted autonomous identity github-actions[bot] can open a\n'
            printf 'green, docs-only pull request through branch-protected checks.\n\n'
            printf -- '- Run ID: %s\n' "$RUN_ID"
            printf -- '- Source commit: %s\n' "$HEAD_SHA"
            printf -- '- Branch: %s\n\n' "$BRANCH"
            printf 'Disposable witness output. Cleanup: close the associated PR and\n'
            printf 'delete branch %s; this file may then be removed.\n' "$BRANCH"
          } > "$DOC_PATH"

          git add "$DOC_PATH"

          # Idempotent: identical run id → identical content → nothing to commit.
          if git diff --cached --quiet; then
            echo "No changes to commit (idempotent re-run)."
          else
            git commit -m "docs(autonomy-witness): witness run ${RUN_ID}"
          fi

          git push --force origin "$BRANCH"

          # Re-run safe: reuse an existing open PR for this branch from this repo
          # (never a same-named fork branch), instead of creating a duplicate.
          existing="$(gh pr list --repo "$REPO" --state open --head "$BRANCH" \
            --json number,headRepositoryOwner \
            --jq ".[] | select(.headRepositoryOwner.login == \"${OWNER}\") | .number" | head -n1)"

          if [ -n "$existing" ]; then
            echo "Reusing existing witness PR #${existing}"
            gh pr view "$existing" --repo "$REPO" --json url --jq .url
            exit 0
          fi

          gh pr create --repo "$REPO" --base "$DEFAULT_BRANCH" --head "$BRANCH" \
            --title "docs(autonomy-witness): witness run ${RUN_ID}" \
            --body "Permanent operational witness infrastructure. This docs-only PR was opened by the allowlisted autonomous identity github-actions[bot] to validate that autonomous identity can open a green PR through branch protection. It changes only doc/autonomy-witness/${RUN_ID}.md. Do NOT auto-merge or auto-approve. Cleanup: close this PR and delete branch ${BRANCH} after witnessing."
