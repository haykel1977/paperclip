name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      skip_llm:
        description: "Skip LLM-dependent assertions (default: true)"
        type: boolean
        default: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PAPERCLIP_E2E_SKIP_LLM: ${{ inputs.skip_llm && 'true' || 'false' }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: google-chrome --version

      - name: Run e2e tests
        env:
          PAPERCLIP_PLAYWRIGHT_CHANNEL: "chrome"
        run: pnpm run test:e2e

      # Multi-user collaboration suite (dedicated local_trusted instance on :3104).
      # Currently 13/20 green; non-blocking while the remaining cases are stabilized.
      - name: Run multi-user e2e tests
        continue-on-error: true
        env:
          PAPERCLIP_PLAYWRIGHT_CHANNEL: "chrome"
        run: pnpm run test:e2e:multiuser

      # Delivery hook → PR creation harness.
      # Validates Paperclip API lifecycle (issue create/checkout/done) and the
      # mock GitHub server utility. Full delivery hook tests (adapter-side git/gh
      # intercept) are skipped with documented rationale pending architectural
      # support for a server-side delivery result endpoint.
      - name: Run delivery E2E tests
        continue-on-error: true
        env:
          PAPERCLIP_PLAYWRIGHT_CHANNEL: "chrome"
        run: pnpm run test:e2e:delivery

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: |
            tests/e2e/playwright-report/
            tests/e2e/test-results/
          retention-days: 14
