name: Secret Scan

# Full working-tree (and, on push, full-history) secret scan with gitleaks.
# This complements the PR-diff scanner in `.github/scripts/check-pr-security.mjs`,
# which only inspects added lines in a single PR. gitleaks catches secrets that
# already live in the tree or were introduced before the diff scanner existed.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:

    # Weekly sweep so long-lived secrets are caught even without new commits.
    - cron: "27 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Full history on push so the scan can see the commits being merged;
          # PRs scan only the diff range gitleaks derives from the event.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          # The default action behaviour fails the job when leaks are found.
          GITLEAKS_ENABLE_SUMMARY: "true"

  # Stable required-context alias. Branch protection on `main` requires the
  # context "Secret Scan", but the scanning job above emits the context
  # "gitleaks" (its job id) — internal tooling (paperclip-checker producer
  # binding, risk-lane classifier, automerge, branch-protection audit) all bind
  # to the name "gitleaks", so that job MUST keep its id/context unchanged.
  # This job additively publishes the "Secret Scan" context (via its `name:`)
  # required by branch protection, and fails closed unless the gitleaks scan
  # concluded `success`. It adds no new privilege (no checkout, no secrets).
  secret-scan:
    name: Secret Scan
    needs: [gitleaks]
    # Run even if `gitleaks` failed/was cancelled so this context still reports a
    # (failing) conclusion rather than being skipped — a skipped required check
    # would leave branch protection pending forever.
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Require the gitleaks scan to have succeeded
        # Pass the needs result via env, never interpolate directly into the
        # shell body, to avoid expression-injection into `run`.
        env:
          GITLEAKS_RESULT: ${{ needs.gitleaks.result }}
        run: |
          if [ "$GITLEAKS_RESULT" != "success" ]; then
            echo "Secret Scan gate: gitleaks result='$GITLEAKS_RESULT' (expected 'success'); failing closed."
            exit 1
          fi
          echo "Secret Scan gate: gitleaks succeeded."
